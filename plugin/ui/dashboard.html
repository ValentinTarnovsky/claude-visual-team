<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Visual Team</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --border-light: #484f58;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --warning: #f78166;
    --purple: #d2a8ff;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }
  .logo span { color: var(--text-muted); font-weight: 400; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.disconnected { background: var(--warning); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(63,185,80,0); }
  }
  .session-select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }
  .session-select:focus { border-color: var(--accent); }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Agent Graph Panel ── */
  .graph-panel {
    flex: 1.6;
    min-width: 320px;
    padding: 16px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .graph-container {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 20px 12px;
  }

  .graph-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .graph-orchestrator {
    position: relative;
    z-index: 1;
    margin-bottom: 48px;
  }

  .graph-children {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .graph-child-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .agent-node {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    min-width: 140px;
    max-width: 220px;
    text-align: center;
    position: relative;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
    z-index: 1;
    cursor: pointer;
  }
  .agent-node:hover { border-color: var(--border-light); transform: translateY(-1px); }
  .agent-node.running { animation: glow 2s ease-in-out infinite; }
  .agent-node.selected {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    animation: none;
  }
  .agent-node .agent-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .agent-node .agent-desc {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 190px;
  }
  .agent-node .agent-status {
    font-size: 10px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .agent-node .agent-status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 2px 20px rgba(88,166,255,0.15); }
  }

  .type-orchestrator { border-color: var(--accent); }
  .type-orchestrator .agent-type { color: var(--accent); }
  .type-explore { border-color: var(--success); }
  .type-explore .agent-type { color: var(--success); }
  .type-plan { border-color: var(--purple); }
  .type-plan .agent-type { color: var(--purple); }
  .type-code, .type-general-purpose { border-color: var(--warning); }
  .type-code .agent-type, .type-general-purpose .agent-type { color: var(--warning); }

  .no-agents {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    font-size: 13px;
    gap: 8px;
  }
  .no-agents .icon { font-size: 32px; opacity: 0.5; }

  /* ── Resizer ── */
  .resizer {
    width: 6px;
    cursor: col-resize;
    background: transparent;
    position: relative;
    flex-shrink: 0;
    z-index: 10;
    transition: background 0.15s;
  }
  .resizer::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 2px;
    width: 2px;
    background: var(--border);
    transition: background 0.15s;
  }
  .resizer:hover::after,
  .resizer.active::after {
    background: var(--accent);
  }
  .resizer:hover,
  .resizer.active {
    background: rgba(88,166,255,0.06);
  }

  /* ── Activity Feed ── */
  .feed-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 250px;
    transition: min-width 0.25s, max-width 0.25s, flex 0.25s;
  }
  .feed-panel.collapsed {
    min-width: 40px;
    max-width: 40px;
    flex: 0 0 40px;
  }
  .feed-panel.collapsed .feed-list,
  .feed-panel.collapsed .feed-filter-bar,
  .feed-panel.collapsed .feed-header-content {
    display: none;
  }
  .feed-panel.collapsed .feed-header {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    padding: 12px 6px;
    height: 100%;
    justify-content: flex-start;
    gap: 16px;
    border-bottom: none;
    border-left: 1px solid var(--border);
  }
  .feed-panel.collapsed .feed-toggle {
    writing-mode: horizontal-tb;
  }

  .feed-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    gap: 8px;
  }
  .feed-header-content {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
    justify-content: space-between;
  }
  .feed-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    width: 26px;
    height: 26px;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .feed-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(88,166,255,0.08);
  }

  /* ── Feed Filter Bar ── */
  .feed-filter-bar {
    padding: 6px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(88,166,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    flex-shrink: 0;
  }
  .feed-filter-bar .filter-label {
    color: var(--accent);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .feed-filter-bar .filter-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .feed-filter-bar .filter-close:hover {
    color: var(--text);
  }

  .feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .feed-item {
    padding: 4px 16px;
    display: flex;
    gap: 10px;
    transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .feed-item:hover { background: rgba(255,255,255,0.02); }
  .feed-item.agent_spawn { border-left-color: var(--accent); }
  .feed-item.agent_complete { border-left-color: var(--success); }
  .feed-item.tool_call { border-left-color: var(--purple); }
  .feed-item.tool_result { border-left-color: var(--border-light); }
  .feed-item.user_message { border-left-color: var(--warning); }

  .feed-time {
    color: var(--text-muted);
    flex-shrink: 0;
    font-size: 11px;
    padding-top: 1px;
  }
  .feed-content { flex: 1; min-width: 0; }
  .feed-label {
    font-weight: 500;
    margin-right: 6px;
  }
  .feed-detail {
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .label-spawn { color: var(--accent); }
  .label-complete { color: var(--success); }
  .label-tool { color: var(--purple); }
  .label-result { color: var(--text-muted); }
  .label-user { color: var(--warning); }

  /* ── Timeline ── */
  .timeline-panel {
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .timeline-track {
    position: relative;
    height: 32px;
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    min-width: 100%;
  }
  .timeline-bar {
    position: absolute;
    top: 50%;
    left: 12px;
    right: 12px;
    height: 2px;
    background: var(--border);
    transform: translateY(-50%);
  }
  .timeline-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--card);
    transition: all 0.2s;
    cursor: pointer;
    z-index: 1;
  }
  .timeline-marker:hover { transform: translate(-50%, -50%) scale(1.4); }
  .timeline-marker.agent_spawn { background: var(--accent); }
  .timeline-marker.agent_complete { background: var(--success); }
  .timeline-marker.tool_call { background: var(--purple); }
  .timeline-marker.user_message { background: var(--warning); }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-value { color: var(--text); font-weight: 500; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  /* ── Empty State ── */
  .empty-feed {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Inter', system-ui, sans-serif;
    gap: 8px;
    padding: 40px;
  }

  /* ── No-select during resize ── */
  body.resizing {
    user-select: none;
    cursor: col-resize !important;
  }
  body.resizing * {
    cursor: col-resize !important;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="status-dot" id="statusDot"></div>
    <div class="logo">Claude Visual Team</div>
  </div>
  <select class="session-select" id="sessionSelect">
    <option value="">No sessions</option>
  </select>
</div>

<!-- Main -->
<div class="main" id="mainLayout">
  <!-- Agent Graph -->
  <div class="graph-panel" id="graphPanel">
    <div class="panel-title">Agent Graph</div>
    <div class="graph-container" id="agentGraph">
      <div class="no-agents">
        <div class="icon">&#x2B21;</div>
        <div>Waiting for agents...</div>
        <div style="font-size:11px">Spawn agents in Claude Code to see them here</div>
      </div>
    </div>
  </div>

  <!-- Resizer -->
  <div class="resizer" id="resizer"></div>

  <!-- Activity Feed -->
  <div class="feed-panel" id="feedPanel">
    <div class="feed-header">
      <button class="feed-toggle" id="feedToggle" title="Collapse Activity Feed">&raquo;</button>
      <div class="feed-header-content">
        <div class="panel-title" style="margin:0">Activity Feed</div>
        <div style="font-size:11px;color:var(--text-muted)" id="eventCount">0 events</div>
      </div>
    </div>
    <div class="feed-filter-bar" id="feedFilterBar" style="display:none">
      <span class="filter-label" id="feedFilterLabel"></span>
      <button class="filter-close" id="feedFilterClose" title="Clear filter">&times;</button>
    </div>
    <div class="feed-list" id="feedList">
      <div class="empty-feed">
        <div>No activity yet</div>
        <div style="font-size:11px">Events will appear here in real-time</div>
      </div>
    </div>
  </div>
</div>

<!-- Timeline -->
<div class="timeline-panel">
  <div class="panel-title" style="margin-bottom:8px">Timeline</div>
  <div class="timeline-track" id="timelineTrack">
    <div class="timeline-bar"></div>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat">Sessions: <span class="stat-value" id="statSessions">0</span></div>
  <div class="stat">Agents: <span class="stat-value" id="statAgents">0</span></div>
  <div class="stat">Tool Calls: <span class="stat-value" id="statTools">0</span></div>
  <div class="stat">Events: <span class="stat-value" id="statEvents">0</span></div>
  <div class="stat">Duration: <span class="stat-value" id="statDuration">0s</span></div>
  <div style="flex:1"></div>
  <div class="stat" id="wsStatus" style="color:var(--success)">Connected</div>
</div>

<script>
(function() {
  'use strict';

  // ── State ──
  let state = {};
  let currentSessionId = null;
  let ws = null;
  let reconnectDelay = 1000;
  let statsCache = { agents: 0, tools: 0, events: 0, earliest: Infinity };
  let feedFilterAgentId = null;
  let feedCollapsed = false;

  // ── Elements ──
  const sessionSelect = document.getElementById('sessionSelect');
  const agentGraph = document.getElementById('agentGraph');
  const feedList = document.getElementById('feedList');
  const eventCount = document.getElementById('eventCount');
  const timelineTrack = document.getElementById('timelineTrack');
  const statusDot = document.getElementById('statusDot');
  const wsStatus = document.getElementById('wsStatus');
  const graphPanel = document.getElementById('graphPanel');
  const feedPanel = document.getElementById('feedPanel');
  const resizer = document.getElementById('resizer');
  const feedToggle = document.getElementById('feedToggle');
  const feedFilterBar = document.getElementById('feedFilterBar');
  const feedFilterLabel = document.getElementById('feedFilterLabel');
  const feedFilterClose = document.getElementById('feedFilterClose');
  const mainLayout = document.getElementById('mainLayout');

  // ── Resizer Drag Logic ──
  let isResizing = false;

  resizer.addEventListener('mousedown', (e) => {
    isResizing = true;
    resizer.classList.add('active');
    document.body.classList.add('resizing');
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const mainRect = mainLayout.getBoundingClientRect();
    const offset = e.clientX - mainRect.left;
    const pct = (offset / mainRect.width) * 100;
    const clamped = Math.max(20, Math.min(85, pct));

    graphPanel.style.flex = 'none';
    graphPanel.style.width = clamped + '%';
    feedPanel.style.flex = '1';

    requestAnimationFrame(drawGraphLines);
  });

  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      resizer.classList.remove('active');
      document.body.classList.remove('resizing');
    }
  });

  // ── Feed Collapse / Expand ──
  feedToggle.addEventListener('click', () => {
    feedCollapsed = !feedCollapsed;
    feedPanel.classList.toggle('collapsed', feedCollapsed);
    feedToggle.innerHTML = feedCollapsed ? '&laquo;' : '&raquo;';
    feedToggle.title = feedCollapsed ? 'Expand Activity Feed' : 'Collapse Activity Feed';
    if (!feedCollapsed) {
      feedPanel.style.flex = '1';
      feedPanel.style.maxWidth = '';
      feedPanel.style.minWidth = '';
    }
    requestAnimationFrame(drawGraphLines);
  });

  // ── Feed Agent Filter ──
  feedFilterClose.addEventListener('click', clearFeedFilter);

  function clearFeedFilter() {
    feedFilterAgentId = null;
    feedFilterBar.style.display = 'none';
    document.querySelectorAll('.agent-node.selected').forEach(n => n.classList.remove('selected'));
    renderFeed();
  }

  function setFeedFilter(agentId, agentLabel) {
    if (feedFilterAgentId === agentId) {
      clearFeedFilter();
      return;
    }
    feedFilterAgentId = agentId;
    feedFilterLabel.textContent = 'Filtering: ' + agentLabel;
    feedFilterBar.style.display = 'flex';
    // Expand feed if collapsed
    if (feedCollapsed) {
      feedCollapsed = false;
      feedPanel.classList.remove('collapsed');
      feedToggle.innerHTML = '&raquo;';
      feedToggle.title = 'Collapse Activity Feed';
      feedPanel.style.flex = '1';
      feedPanel.style.maxWidth = '';
      feedPanel.style.minWidth = '';
    }
    // Update selected visual
    document.querySelectorAll('.agent-node.selected').forEach(n => n.classList.remove('selected'));
    const node = document.querySelector(`.agent-node[data-agent-id="${CSS.escape(agentId)}"]`);
    if (node) node.classList.add('selected');
    renderFeed();
  }

  // ── Helpers ──
  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatDuration(ms) {
    if (ms < 1000) return ms + 'ms';
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  }

  function getTypeClass(type) {
    if (!type) return 'type-code';
    const t = type.toLowerCase().replace(/[^a-z-]/g, '');
    if (t.includes('explore')) return 'type-explore';
    if (t.includes('plan')) return 'type-plan';
    if (t.includes('code') || t.includes('general')) return 'type-code';
    return 'type-code';
  }

  function getTypeColor(type) {
    const cls = getTypeClass(type);
    if (cls === 'type-explore') return 'var(--success)';
    if (cls === 'type-plan') return 'var(--purple)';
    return 'var(--warning)';
  }

  // ── Session Select ──
  sessionSelect.addEventListener('change', () => {
    currentSessionId = sessionSelect.value || null;
    clearFeedFilter();
    render();
  });

  function getLastActivity(session) {
    if (session.lastActivity) return session.lastActivity;
    const events = session.events || [];
    if (events.length === 0) return session.startTime || 0;
    return events[events.length - 1].timestamp || session.startTime || 0;
  }

  const ACTIVE_WINDOW_MS = 24 * 60 * 60 * 1000; // 24 hours

  const BG_PATTERNS = ['claude-mem-observer'];

  function isBackgroundSession(id) {
    const proj = state[id].projectPath || '';
    return BG_PATTERNS.some(p => proj.includes(p));
  }

  function updateSessionSelect() {
    const ids = Object.keys(state);
    const prev = sessionSelect.value;
    sessionSelect.innerHTML = '';

    const now = Date.now();

    const active = ids.filter(id => {
      const last = getLastActivity(state[id]);
      return (now - last) < ACTIVE_WINDOW_MS && !isBackgroundSession(id);
    });

    active.sort((a, b) => getLastActivity(state[b]) - getLastActivity(state[a]));

    if (active.length === 0) {
      sessionSelect.innerHTML = '<option value="">No active sessions</option>';
      currentSessionId = null;
      return;
    }

    active.forEach((id) => {
      const s = state[id];
      const evtCount = (s.events || []).length;
      const proj = (s.projectPath || id).split(/[/\\]/).pop();
      const name = s.title || (proj + ' \u2014 ' + id.slice(0, 8));
      const label = name + (evtCount > 0 ? ' (' + evtCount + ')' : '');
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = label;
      sessionSelect.appendChild(opt);
    });

    if (prev && active.includes(prev)) {
      sessionSelect.value = prev;
      currentSessionId = prev;
    } else {
      sessionSelect.value = active[0];
      currentSessionId = active[0];
    }
  }

  // ── SVG Graph Lines ──
  function drawGraphLines() {
    const svg = document.getElementById('graphSvg');
    if (!svg) return;

    const containerRect = agentGraph.getBoundingClientRect();
    const w = containerRect.width;
    const h = containerRect.height;
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);

    const orchEl = document.getElementById('graphOrch');
    const children = document.querySelectorAll('.graph-child-wrapper');
    if (!orchEl || children.length === 0) { svg.innerHTML = ''; return; }

    const orchRect = orchEl.getBoundingClientRect();
    const ox = orchRect.left + orchRect.width / 2 - containerRect.left;
    const oy = orchRect.bottom - containerRect.top;

    let paths = '';
    const r = 10;

    children.forEach(child => {
      const cr = child.getBoundingClientRect();
      const cx = cr.left + cr.width / 2 - containerRect.left;
      const cy = cr.top - containerRect.top;
      const midY = oy + (cy - oy) / 2;

      if (Math.abs(cx - ox) < 3) {
        // Straight vertical
        paths += '<line x1="' + ox + '" y1="' + oy + '" x2="' + cx + '" y2="' + cy + '" stroke="var(--border-light)" stroke-width="2" stroke-opacity="0.6"/>';
      } else {
        // Stepped path with rounded corners
        const dx = Math.min(r, Math.abs(cx - ox) / 2);
        const dy = Math.min(r, (cy - oy) / 4);
        const dir = cx > ox ? 1 : -1;

        paths += '<path d="M ' + ox + ' ' + oy
          + ' L ' + ox + ' ' + (midY - dy)
          + ' Q ' + ox + ' ' + midY + ' ' + (ox + dir * dx) + ' ' + midY
          + ' L ' + (cx - dir * dx) + ' ' + midY
          + ' Q ' + cx + ' ' + midY + ' ' + cx + ' ' + (midY + dy)
          + ' L ' + cx + ' ' + cy
          + '" fill="none" stroke="var(--border-light)" stroke-width="2" stroke-opacity="0.6"/>';
      }
    });

    svg.innerHTML = paths;
  }

  // Redraw lines on window resize
  window.addEventListener('resize', () => requestAnimationFrame(drawGraphLines));

  // ── Render Agent Graph ──
  function renderGraph() {
    const session = currentSessionId ? state[currentSessionId] : null;
    const agents = session ? Object.values(session.agents || {}) : [];

    if (agents.length === 0) {
      agentGraph.innerHTML = '<div class="no-agents">'
        + '<div class="icon">&#x2B21;</div>'
        + '<div>Waiting for agents...</div>'
        + '<div style="font-size:11px">Spawn agents in Claude Code to see them here</div>'
        + '</div>';
      return;
    }

    let html = '<svg class="graph-svg" id="graphSvg"></svg>';

    // Orchestrator
    html += '<div class="graph-orchestrator" id="graphOrch">'
      + '<div class="agent-node type-orchestrator running" data-agent-id="orchestrator">'
      + '<div class="agent-type">Orchestrator</div>'
      + '<div class="agent-desc">Main session</div>'
      + '<div class="agent-status"><span class="dot" style="background:var(--accent)"></span> active</div>'
      + '</div></div>';

    // Children
    html += '<div class="graph-children">';
    agents.forEach((agent) => {
      const typeClass = getTypeClass(agent.type);
      const isRunning = agent.status === 'running';
      const statusColor = isRunning ? getTypeColor(agent.type) : 'var(--success)';
      const statusText = isRunning ? 'running' : 'completed';
      const tools = (agent.toolCalls || []).length;
      const selected = feedFilterAgentId === agent.id ? ' selected' : '';
      const desc = agent.description || agent.prompt || '...';
      const agentLabel = (agent.type || 'agent') + ': ' + desc.slice(0, 40);

      html += '<div class="graph-child-wrapper">'
        + '<div class="agent-node ' + typeClass + (isRunning ? ' running' : '') + selected
        + '" data-agent-id="' + escHtml(agent.id) + '" data-agent-label="' + escHtml(agentLabel) + '">'
        + '<div class="agent-type">' + escHtml(agent.type || 'agent') + '</div>'
        + '<div class="agent-desc" title="' + escHtml(desc) + '">' + escHtml(desc) + '</div>'
        + '<div class="agent-status"><span class="dot" style="background:' + statusColor + '"></span> '
        + statusText + (tools > 0 ? ' &middot; ' + tools + ' tools' : '')
        + '</div></div></div>';
    });
    html += '</div>';

    agentGraph.innerHTML = html;

    // Attach click handlers
    agentGraph.querySelectorAll('.agent-node[data-agent-id]').forEach(node => {
      node.addEventListener('click', () => {
        const id = node.dataset.agentId;
        if (id === 'orchestrator') {
          clearFeedFilter();
          return;
        }
        setFeedFilter(id, node.dataset.agentLabel || id);
      });
    });

    // Draw SVG lines after layout
    requestAnimationFrame(drawGraphLines);
  }

  // ── Render Feed ──
  function renderFeed() {
    const session = currentSessionId ? state[currentSessionId] : null;
    const allEvents = session ? (session.events || []) : [];
    let events = allEvents;

    if (feedFilterAgentId) {
      events = allEvents.filter(e => e.agentId === feedFilterAgentId);
    }

    if (events.length === 0) {
      const msg = feedFilterAgentId ? 'No events for this agent' : 'No activity yet';
      const sub = feedFilterAgentId ? 'Try selecting a different agent' : 'Events will appear here in real-time';
      feedList.innerHTML = '<div class="empty-feed"><div>' + msg + '</div>'
        + '<div style="font-size:11px">' + sub + '</div></div>';
      eventCount.textContent = feedFilterAgentId
        ? '0/' + allEvents.length + ' events'
        : '0 events';
      return;
    }

    eventCount.textContent = feedFilterAgentId
      ? events.length + '/' + allEvents.length + ' events'
      : events.length + ' events';

    const visible = events.slice(-200);
    let html = '';

    visible.forEach((evt) => {
      const time = formatTime(evt.timestamp);
      let label = '', detail = '', labelClass = '';

      switch (evt.type) {
        case 'agent_spawn':
          label = 'Agent spawned';
          labelClass = 'label-spawn';
          detail = (evt.agentType || 'agent') + (evt.description ? ' \u2014 ' + evt.description : '');
          break;
        case 'agent_complete':
          label = 'Agent completed';
          labelClass = 'label-complete';
          detail = (evt.agentType || 'agent') + ' (' + formatDuration(evt.duration || 0) + ')';
          break;
        case 'tool_call':
          label = evt.toolName || 'Tool';
          labelClass = 'label-tool';
          detail = evt.toolInput ? evt.toolInput.slice(0, 120) : '';
          break;
        case 'tool_result':
          label = 'Result';
          labelClass = 'label-result';
          detail = evt.result ? evt.result.slice(0, 120) : '';
          break;
        case 'user_message':
          label = 'User';
          labelClass = 'label-user';
          detail = evt.text || '';
          break;
        default:
          label = evt.type;
          labelClass = '';
          detail = JSON.stringify(evt).slice(0, 100);
      }

      html += '<div class="feed-item ' + evt.type + '">'
        + '<span class="feed-time">' + time + '</span>'
        + '<div class="feed-content">'
        + '<span class="feed-label ' + labelClass + '">' + escHtml(label) + '</span>'
        + '<span class="feed-detail">' + escHtml(detail) + '</span>'
        + '</div></div>';
    });

    const wasScrolled = feedList.scrollTop >= feedList.scrollHeight - feedList.clientHeight - 50;
    feedList.innerHTML = html;
    if (wasScrolled) feedList.scrollTop = feedList.scrollHeight;
  }

  // ── Render Timeline ──
  function renderTimeline() {
    const session = currentSessionId ? state[currentSessionId] : null;
    const events = session ? (session.events || []) : [];

    let html = '<div class="timeline-bar"></div>';

    if (events.length < 2) {
      timelineTrack.innerHTML = html;
      return;
    }

    const minT = events[0].timestamp;
    const maxT = events[events.length - 1].timestamp;
    const range = maxT - minT || 1;

    const step = Math.max(1, Math.floor(events.length / 80));
    for (let i = 0; i < events.length; i += step) {
      const evt = events[i];
      const pct = 12 + ((evt.timestamp - minT) / range) * 76;
      html += '<div class="timeline-marker ' + evt.type + '" style="left:' + pct + '%" title="' + formatTime(evt.timestamp) + ' \u2014 ' + evt.type + '"></div>';
    }

    timelineTrack.innerHTML = html;
  }

  // ── Stats ──
  function rebuildStatsCache() {
    const c = { agents: 0, tools: 0, events: 0, earliest: Infinity };
    Object.values(state).forEach((s) => {
      c.agents += Object.keys(s.agents || {}).length;
      c.events += (s.events || []).length;
      (s.events || []).forEach((e) => { if (e.type === 'tool_call') c.tools++; });
      if (s.startTime < c.earliest) c.earliest = s.startTime;
    });
    statsCache = c;
  }

  function renderStats() {
    document.getElementById('statSessions').textContent = Object.keys(state).length;
    document.getElementById('statAgents').textContent = statsCache.agents;
    document.getElementById('statTools').textContent = statsCache.tools;
    document.getElementById('statEvents').textContent = statsCache.events;
    document.getElementById('statDuration').textContent = statsCache.earliest < Infinity
      ? formatDuration(Date.now() - statsCache.earliest)
      : '0s';
  }

  // ── Full Render ──
  function render() {
    updateSessionSelect();
    renderGraph();
    renderFeed();
    renderTimeline();
    renderStats();
  }

  // ── Escape HTML ──
  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = () => {
      reconnectDelay = 1000;
      statusDot.classList.remove('disconnected');
      wsStatus.textContent = 'Connected';
      wsStatus.style.color = 'var(--success)';
    };

    ws.onclose = () => {
      statusDot.classList.add('disconnected');
      wsStatus.textContent = 'Disconnected';
      wsStatus.style.color = 'var(--warning)';
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        handleMessage(data);
      } catch (_) {}
    };
  }

  function handleMessage(data) {
    if (data.type === 'init') {
      state = data.state || {};
      rebuildStatsCache();
      render();
      return;
    }

    if (data.type === 'event' && data.sessionId) {
      const isNew = !state[data.sessionId];
      if (isNew) {
        state[data.sessionId] = { sessionId: data.sessionId, projectPath: '', agents: {}, events: [], startTime: Date.now() };
      }
      const session = state[data.sessionId];
      session.events.push(data.event);

      statsCache.events++;
      if (session.startTime < statsCache.earliest) statsCache.earliest = session.startTime;

      const evt = data.event;
      let graphChanged = false;
      if (evt.type === 'agent_spawn') {
        session.agents[evt.agentId] = {
          id: evt.agentId,
          type: evt.agentType,
          description: evt.description,
          prompt: evt.prompt,
          status: 'running',
          toolCalls: [],
          startTime: evt.timestamp,
        };
        statsCache.agents++;
        graphChanged = true;
      } else if (evt.type === 'agent_complete' && session.agents[evt.agentId]) {
        session.agents[evt.agentId].status = 'completed';
        session.agents[evt.agentId].endTime = evt.timestamp;
        graphChanged = true;
      } else if (evt.type === 'tool_call') {
        statsCache.tools++;
        if (session.agents[evt.agentId]) {
          session.agents[evt.agentId].toolCalls.push({ name: evt.toolName, time: evt.timestamp });
          graphChanged = true;
        }
      }

      if (!currentSessionId || isNew) {
        currentSessionId = data.sessionId;
      }
      updateSessionSelect();

      if (graphChanged && data.sessionId === currentSessionId) renderGraph();
      if (data.sessionId === currentSessionId) {
        renderFeed();
        renderTimeline();
      }
      renderStats();
      return;
    }

    if (data.type === 'meta_update' && data.sessionId && state[data.sessionId]) {
      const session = state[data.sessionId];
      if (data.meta && data.agentFileId) {
        for (const id of Object.keys(session.agents)) {
          const agent = session.agents[id];
          if (agent.subagentFileId === data.agentFileId || !agent.subagentFileId) {
            if (data.meta.type) agent.type = data.meta.type;
            if (data.meta.model) agent.model = data.meta.model;
            if (!agent.subagentFileId) agent.subagentFileId = data.agentFileId;
            break;
          }
        }
        if (data.sessionId === currentSessionId) renderGraph();
      }
    }
  }

  // ── Init ──
  connect();

  setInterval(() => {
    renderStats();
  }, 1000);
})();
</script>
</body>
</html>
